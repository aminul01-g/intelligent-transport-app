name: Continuous Integration

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: transport-app/package-lock.json

      # Run npm ci inside transport-app workspace
      - name: Install dependencies
        run: |
          cd transport-app
          npm ci

      - name: Check code formatting (Prettier)
        run: |
          cd transport-app
          npx prettier --check "**/*.{ts,tsx,js,json,md}"

      - name: Run ESLint
        run: |
          cd transport-app
          npm run lint

      - name: Run TypeScript validation (typecheck)
        run: |
          cd transport-app
          npm run typecheck

      - name: Execute tests
        run: |
          cd transport-app
          npm run test

name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

# Only run if CI passed. The 'if' condition is evaluated per-job below
# to allow the job to skip gracefully rather than be skipped at workflow level.

jobs:
  push-images:
    name: Build & Push Docker Images → ghcr.io
    runs-on: ubuntu-latest

    # Guard: only deploy when the triggering CI run concluded successfully
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read # Checkout the repository
      packages: write # Push to GitHub Container Registry (ghcr.io)

    env:
      REGISTRY: ghcr.io
      # Derive image name from the repository slug (e.g. org/repo → org/repo)
      IMAGE_PREFIX: ghcr.io/${{ github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Check out the commit that triggered the CI run
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set image tag variables
        id: meta
        run: |
          SHA="${{ github.event.workflow_run.head_sha }}"
          # Short SHA for readability in image tags
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      # Log in to GitHub Container Registry using the built-in GITHUB_TOKEN.
      # No additional secrets needed — GITHUB_TOKEN is automatically available.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Set up Docker Buildx for advanced build features (cache, multi-platform)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------------------------------------------------
      # Build and push the API image
      # Tagged with both the full git SHA and 'latest'
      # -----------------------------------------------------------------------
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/docker/api.Dockerfile
          target: runner
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/api:${{ steps.meta.outputs.sha }}
            ${{ env.IMAGE_PREFIX }}/api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      # -----------------------------------------------------------------------
      # Build and push the Web image
      # NEXT_PUBLIC_ vars are passed as --build-arg, sourced from GitHub secrets.
      # They are baked into the client JS bundle at build time (not runtime).
      # -----------------------------------------------------------------------
      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./infra/docker/web.Dockerfile
          target: runner
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/web:${{ steps.meta.outputs.sha }}
            ${{ env.IMAGE_PREFIX }}/web:latest
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SOCKET_URL=${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

      - name: Deployment summary
        run: |
          echo "### 🚀 Images pushed to ghcr.io" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Tag |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.IMAGE_PREFIX }}/api\` | \`${{ steps.meta.outputs.sha }}\`, \`latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.IMAGE_PREFIX }}/web\` | \`${{ steps.meta.outputs.sha }}\`, \`latest\` |" >> $GITHUB_STEP_SUMMARY

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: transport_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - transport_net

  redis:
    image: redis:7-alpine
    container_name: transport_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - transport_net

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: development
      args:
        NODE_ENV: development
    container_name: transport_api
    ports:
      - "4000:4000"
    env_file:
      - ./apps/api/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - transport_net

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      target: development
      args:
        NODE_ENV: development
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: transport_web
    ports:
      - "3000:3000"
    env_file:
      - ./apps/web/.env
    depends_on:
      - api
    networks:
      - transport_net

volumes:
  pgdata:
  redisdata:

networks:
  transport_net:
    driver: bridge
